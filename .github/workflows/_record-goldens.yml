name: _record-goldens (throwaway)
# One-shot: record the linux golden snapshots on a real x86_64 ubuntu runner and
# upload them as an artifact (the ARM dev machine can't record them — qemu OOMs the
# :ui Kotlin compile). Triggered by push to this feature branch; removed once the
# goldens are committed. See processes/agent-dev-loop.md (per-OS golden sets).
on:
  push:
    branches: [feat/owner-invite-mint-ui]

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Record the changed (members) golden snapshots (linux)
        working-directory: apps
        run: ./gradlew --no-daemon :ui:desktopTest --tests "*GoldenSnapshotTest.members*" -Dsnapshot.record=true
      - name: Upload the recorded linux goldens
        uses: actions/upload-artifact@v4
        with:
          name: linux-goldens
          path: apps/ui/src/desktopTest/resources/snapshots/linux/members-*.png
          if-no-files-found: error
